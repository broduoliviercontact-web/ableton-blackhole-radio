<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RADIO BLACKHOLE — Live Web Audio</title>
    <!-- Pose data-theme avant le paint (anti-FOUC) : localStorage > prefers-color-scheme
         (light) > dark (identité Radio Blackhole par défaut). Cf. useTheme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('radio.theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
